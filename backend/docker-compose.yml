version: '3.9'

x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-production}
  HOST: 0.0.0.0
  PORT: 3000
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-automation}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  API_KEY: ${API_KEY:-dev-key-change-in-prod}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  OPENROUTER_ENABLE_REASONING: ${OPENROUTER_ENABLE_REASONING:-true}
  CHAT_LLM_MODEL: ${CHAT_LLM_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
  AI_PLANNER_MODEL: ${AI_PLANNER_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
  AI_SELECTOR_MODEL: ${AI_SELECTOR_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
  AI_RECOVERY_MODEL: ${AI_RECOVERY_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  LLM_MODEL: ${LLM_MODEL:-nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
  USER_FILE_STORAGE_ROOT: ${USER_FILE_STORAGE_ROOT:-/data/user-files}
  CAPTCHA_WEBHOOK_URL: ${CAPTCHA_WEBHOOK_URL:-}
  WHISPER_API_URL: ${WHISPER_API_URL:-}
  CORS_ORIGIN: ${CORS_ORIGIN:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  RATE_LIMIT: ${RATE_LIMIT:-100}
  MIN_BROWSERS: ${MIN_BROWSERS:-1}
  MAX_BROWSERS: ${MAX_BROWSERS:-3}
  MAX_CONTEXTS_PER_BROWSER: ${MAX_CONTEXTS_PER_BROWSER:-4}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-automation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-automation}"]
      <<: *healthcheck-defaults

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000;
      else
        exec redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PUBLIC_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "${API_PUBLIC_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - user_files_data:/data/user-files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      <<: *healthcheck-defaults

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - user_files_data:/data/user-files
      - worker_screenshots:/tmp/screenshots
      - worker_downloads:/tmp/downloads
    shm_size: '2gb'

  scheduler:
    profiles: ["scheduler"]
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.scheduler
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PUBLIC_PORT:-9090}:9090"

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:10.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/prometheus/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "${GRAFANA_PUBLIC_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  user_files_data:
  worker_screenshots:
  worker_downloads:
  prometheus_data:
  grafana_data:
