name: Observability compose smoke

on:
  push:
    paths:
      - "infra/observability/**"
  pull_request:
    paths:
      - "infra/observability/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f infra/observability/docker-compose.yml config --quiet
